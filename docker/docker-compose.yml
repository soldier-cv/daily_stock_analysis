# ===================================
# A股自选股智能分析系统 - Docker Compose
# ===================================

name: daily-stock-analysis
version: '3.8'

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: unless-stopped

  env_file:
    - ../.env

  volumes:
    - /data/daily_stock_analysis/data:/app/data
    - /data/daily_stock_analysis/logs:/app/logs
    - /data/daily_stock_analysis/reports:/app/reports
    - /data/daily_stock_analysis/strategies:/app/strategies:ro

  environment:
    - TZ=Asia/Shanghai
    - WEBUI_HOST=0.0.0.0

  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 256M

services:
  # 定时任务模式
  analyzer:
    <<: *common
    container_name: stock-analyzer

  # FastAPI 模式
  server:
    <<: *common
    container_name: stock-server
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "${API_PORT:-8000}"]
    ports:
      - "5090:${API_PORT:-8000}"
